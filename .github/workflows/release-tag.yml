# 推送以 v 开头的 tag（例如 v0.1.0）时，在 Windows / macOS 上执行 tauri build，
# 并将安装包上传到同名 GitHub Release（由 tauri-action 创建或关联）。

name: Release on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            # 仅打 DMG，避免无关目标拖慢或干扰 CI
            args: '--ci --bundles dmg'
          - platform: windows-latest
            # 仅打 NSIS（setup.exe）。targets=all 会带 msi，需 WiX，GitHub 默认可用环境常缺它导致整次构建失败
            args: '--ci --bundles nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          CI: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: gif-composer ${{ github.ref_name }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
